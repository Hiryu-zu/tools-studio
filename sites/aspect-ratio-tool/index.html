<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画像比率変換ツール</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Segoe UI", sans-serif;
  background: #f0f4f8;
  color: #1a1a2e;
  min-height: 100vh;
  padding: 24px 16px;
}

h1 { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 20px; }

/* ---------- Drop zone ---------- */
.drop-zone {
  border: 2px dashed #94b4d4; border-radius: 16px; background: #fff;
  padding: 56px 24px; text-align: center; cursor: pointer;
  transition: border-color .2s, background .2s;
  max-width: 560px; margin: 0 auto 24px;
}
.drop-zone.drag-over { border-color: #3b82f6; background: #eff6ff; }
.drop-zone-icon { font-size: 48px; margin-bottom: 12px; }
.drop-zone strong { font-size: 16px; display: block; margin-bottom: 6px; }
.drop-zone p { color: #888; font-size: 13px; }
#fileInput { display: none; }

/* ---------- Editor ---------- */
.editor { display: none; max-width: 980px; margin: 0 auto; }

/* ---------- Mode switcher ---------- */
.mode-switch {
  display: flex; gap: 0; justify-content: center;
  background: #e2e8f0; border-radius: 10px; padding: 4px;
  width: fit-content; margin: 0 auto 20px;
}
.mode-btn {
  padding: 9px 22px; border-radius: 8px; border: none;
  background: transparent; cursor: pointer; font-size: 13px;
  font-weight: 500; font-family: inherit; color: #555;
  transition: all .15s;
}
.mode-btn.active { background: #fff; color: #1a1a2e; box-shadow: 0 1px 4px rgba(0,0,0,.12); }

/* ---------- Presets ---------- */
.presets-label { text-align: center; font-size: 12px; color: #888; margin-bottom: 8px; }
.presets { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
.preset-btn {
  padding: 8px 16px; border-radius: 8px; border: 2px solid #d0d8e8;
  background: #fff; cursor: pointer; font-size: 12px; white-space: pre;
  text-align: center; line-height: 1.45; transition: all .15s;
  min-width: 80px; font-family: inherit;
}
.preset-btn:hover { border-color: #3b82f6; color: #2563eb; }
.preset-btn.active { border-color: #3b82f6; background: #3b82f6; color: #fff; }

/* ---------- Main layout ---------- */
.main-area {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 24px; align-items: start;
}
@media (max-width: 700px) { .main-area { grid-template-columns: 1fr; } }

/* ---------- Image area ---------- */
.img-panel {
  background: #fff; border-radius: 12px; padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.07);
}
.img-panel-label { font-size: 12px; color: #888; margin-bottom: 10px; }

/* Letterbox mode: image fills container, show full */
.editor.mode-lb .img-wrapper img {
  display: block; width: 100%; max-height: 500px;
  object-fit: contain; border-radius: 6px;
  background: repeating-conic-gradient(#e0e0e0 0% 25%,#fff 0% 50%) 0 0/16px 16px;
}

/* Crop mode: image with constrained size for overlay */
.editor.mode-crop .img-wrapper {
  position: relative; display: inline-block; user-select: none;
}
.editor.mode-crop .img-wrapper img {
  display: block; max-width: 580px; max-height: 460px;
  border-radius: 6px;
}

/* Crop box (hidden in LB mode) */
.crop-box {
  display: none;
  position: absolute; border: 2px solid #fff;
  box-shadow: 0 0 0 9999px rgba(0,0,0,.48);
  cursor: move; box-sizing: border-box; border-radius: 1px;
}
.editor.mode-crop .crop-box { display: block; }
.crop-box .handle {
  position: absolute; width: 10px; height: 10px;
  background: #fff; border-radius: 2px;
}
.crop-box .handle.tl { top: -4px; left: -4px; }
.crop-box .handle.tr { top: -4px; right: -4px; }
.crop-box .handle.bl { bottom: -4px; left: -4px; }
.crop-box .handle.br { bottom: -4px; right: -4px; }

/* ---------- Right panel ---------- */
.right-panel { display: flex; flex-direction: column; gap: 16px; }

.preview-panel {
  background: #fff; border-radius: 12px; padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.07); text-align: center;
}
.preview-panel h3 { font-size: 12px; color: #888; margin-bottom: 10px; }
#previewCanvas {
  display: block; margin: 0 auto 8px; border-radius: 6px;
  max-width: 240px; max-height: 240px;
  border: 1px solid #e0e8f0;
  background: repeating-conic-gradient(#e0e0e0 0% 25%,#fff 0% 50%) 0 0/12px 12px;
}
.output-size { font-size: 12px; color: #888; }

/* Crop-mode specific info */
.crop-info { font-size: 12px; color: #888; margin-top: 4px; }

/* ---------- BG panel (letterbox only) ---------- */
.bg-panel {
  background: #fff; border-radius: 12px; padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.07);
  transition: opacity .2s;
}
.editor.mode-crop .bg-panel { display: none; }
.bg-panel h3 { font-size: 12px; color: #888; margin-bottom: 10px; }
.bg-options { display: flex; flex-wrap: wrap; gap: 8px; }
.bg-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 8px;
  border: 2px solid #d0d8e8; background: #fff;
  cursor: pointer; font-size: 12px; font-family: inherit;
  transition: all .15s;
}
.bg-btn:hover { border-color: #3b82f6; }
.bg-btn.active { border-color: #3b82f6; background: #eff6ff; }
.bg-swatch {
  width: 16px; height: 16px; border-radius: 3px;
  border: 1px solid #ccc; flex-shrink: 0;
}
.bg-swatch.white  { background: #fff; }
.bg-swatch.black  { background: #111; }
.bg-swatch.blur   { background: linear-gradient(135deg,#a8c8ff,#ffa8d4,#a8ffd4); }
.bg-swatch.transp { background: repeating-conic-gradient(#ccc 0% 25%,#fff 0% 50%) 0 0/8px 8px; }
.color-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.color-row label { font-size: 12px; color: #555; }
#customColor { width: 32px; height: 26px; border: none; padding: 0; cursor: pointer; border-radius: 4px; }

/* ---------- Download ---------- */
.dl-section { text-align: center; margin-top: 20px; }
.dl-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.dl-btn {
  padding: 13px 28px; border-radius: 10px; border: none;
  cursor: pointer; font-size: 14px; font-weight: 600;
  font-family: inherit; transition: opacity .15s, transform .1s;
}
.dl-btn:hover { opacity: .88; transform: translateY(-1px); }
.dl-btn.png { background: #3b82f6; color: #fff; }
.dl-btn.jpg { background: #10b981; color: #fff; }
.success-msg { margin-top: 10px; font-size: 13px; color: #10b981; min-height: 18px; }
.change-img {
  display: inline-block; margin-top: 14px;
  font-size: 13px; color: #3b82f6; cursor: pointer; text-decoration: underline;
}
</style>
</head>
<body>

<h1>🖼 画像比率変換ツール</h1>
<p class="subtitle">note・SNS向けに比率を変換 → ダウンロード</p>

<!-- Drop zone -->
<div class="drop-zone" id="dropZone">
  <div class="drop-zone-icon">📂</div>
  <strong>クリックまたはドラッグ＆ドロップで画像を読み込む</strong>
  <p>PNG / JPEG / WebP / GIF に対応</p>
  <input type="file" id="fileInput" accept="image/*">
</div>

<!-- Editor -->
<div class="editor mode-lb" id="editor">

  <!-- Mode switch -->
  <div class="mode-switch">
    <button class="mode-btn active" data-mode="lb">🖼 レターボックス（余白追加）</button>
    <button class="mode-btn" data-mode="crop">✂ クロップ（切り取り）</button>
  </div>

  <!-- Presets -->
  <p class="presets-label">▼ 比率を選ぶ</p>
  <div class="presets" id="presets"></div>

  <!-- Main area -->
  <div class="main-area">
    <!-- Left: image (shared between modes) -->
    <div class="img-panel">
      <p class="img-panel-label" id="imgPanelLabel">元の画像（全体）</p>
      <div class="img-wrapper" id="imgWrapper">
        <img id="displayImg" alt="">
        <div class="crop-box" id="cropBox">
          <span class="handle tl"></span><span class="handle tr"></span>
          <span class="handle bl"></span><span class="handle br"></span>
        </div>
      </div>
    </div>

    <!-- Right: preview + bg panel -->
    <div class="right-panel">
      <div class="preview-panel">
        <h3>プレビュー</h3>
        <canvas id="previewCanvas"></canvas>
        <p class="output-size" id="outputSize"></p>
      </div>

      <!-- BG panel (letterbox only) -->
      <div class="bg-panel">
        <h3>余白の背景</h3>
        <div class="bg-options">
          <button class="bg-btn active" data-bg="white"><span class="bg-swatch white"></span>白</button>
          <button class="bg-btn" data-bg="black"><span class="bg-swatch black"></span>黒</button>
          <button class="bg-btn" data-bg="blur"><span class="bg-swatch blur"></span>ぼかし拡張</button>
          <button class="bg-btn" data-bg="transparent"><span class="bg-swatch transp"></span>透明(PNG)</button>
        </div>
        <div class="color-row">
          <label>カスタム:</label>
          <input type="color" id="customColor" value="#ffffff">
          <button class="bg-btn" data-bg="custom" id="customBgBtn">
            <span class="bg-swatch" id="customSwatch" style="background:#ffffff"></span>カスタム
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Download -->
  <div class="dl-section">
    <div class="dl-btns">
      <button class="dl-btn png" id="dlPng">⬇ PNG でダウンロード</button>
      <button class="dl-btn jpg" id="dlJpg">⬇ JPEG でダウンロード</button>
    </div>
    <p class="success-msg" id="successMsg"></p>
    <a class="change-img" id="changeImg">別の画像を選ぶ</a>
  </div>

</div>

<script>
/* ===== Config ===== */
const PRESETS = [
  { label: 'note見出し\n16 : 9', w: 16, h: 9  },
  { label: '正方形\n1 : 1',      w: 1,  h: 1  },
  { label: '横長\n4 : 3',        w: 4,  h: 3  },
  { label: '縦長\n3 : 4',        w: 3,  h: 4  },
  { label: 'ポートレート\n2 : 3', w: 2,  h: 3  },
  { label: 'ストーリー\n9 : 16', w: 9,  h: 16 },
];

/* ===== State ===== */
let img = null;
let mode = 'lb';          // 'lb' | 'crop'
let ratio = PRESETS[0];
let bgType = 'white';
let customColor = '#ffffff';
// Crop state (natural px)
let cropX = 0, cropY = 0, cropW = 0, cropH = 0;

/* ===== DOM refs ===== */
const dropZone      = document.getElementById('dropZone');
const fileInput     = document.getElementById('fileInput');
const editorEl      = document.getElementById('editor');
const displayImg    = document.getElementById('displayImg');
const imgWrapper    = document.getElementById('imgWrapper');
const cropBox       = document.getElementById('cropBox');
const previewCanvas = document.getElementById('previewCanvas');
const outputSizeEl  = document.getElementById('outputSize');
const successMsg    = document.getElementById('successMsg');
const imgPanelLabel = document.getElementById('imgPanelLabel');

/* ===== Mode switch ===== */
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    editorEl.className = 'editor mode-' + mode;
    imgPanelLabel.textContent = mode === 'lb' ? '元の画像（全体）' : '範囲を選ぶ（ドラッグで移動）';
    if (img) {
      if (mode === 'crop') fitCropToRatio();
      updateUI();
    }
  });
});

/* ===== Preset buttons ===== */
PRESETS.forEach((p, i) => {
  const btn = document.createElement('button');
  btn.className = 'preset-btn' + (i === 0 ? ' active' : '');
  btn.textContent = p.label;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ratio = p;
    if (mode === 'crop') fitCropToRatio();
    updateUI();
  });
  document.getElementById('presets').appendChild(btn);
});

/* ===== BG options ===== */
document.querySelectorAll('.bg-btn[data-bg]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    bgType = btn.dataset.bg;
    updateUI();
  });
});
const customColorInput = document.getElementById('customColor');
const customSwatch = document.getElementById('customSwatch');
customColorInput.addEventListener('input', e => {
  customColor = e.target.value;
  customSwatch.style.background = customColor;
  if (bgType === 'custom') updateUI();
});

/* ===== File loading ===== */
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
document.getElementById('changeImg').addEventListener('click', () => {
  editorEl.style.display = 'none'; dropZone.style.display = '';
  img = null; fileInput.value = '';
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    img = new Image();
    img.onload = () => {
      displayImg.src = ev.target.result;
      // reset
      ratio = PRESETS[0];
      bgType = 'white';
      document.querySelectorAll('.preset-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
      document.querySelectorAll('.bg-btn').forEach(b => b.classList.toggle('active', b.dataset.bg === 'white'));
      dropZone.style.display = 'none';
      editorEl.style.display = 'block';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        if (mode === 'crop') fitCropToRatio();
        updateUI();
      }));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ===== Crop helpers ===== */
function fitCropToRatio() {
  const rw = ratio.w, rh = ratio.h;
  const iw = img.naturalWidth, ih = img.naturalHeight;
  let cw = iw, ch = Math.round(iw * rh / rw);
  if (ch > ih) { ch = ih; cw = Math.round(ih * rw / rh); }
  cropW = cw; cropH = ch;
  cropX = Math.round((iw - cropW) / 2);
  cropY = Math.round((ih - cropH) / 2);
}

function clampCrop() {
  cropX = Math.max(0, Math.min(img.naturalWidth  - cropW, cropX));
  cropY = Math.max(0, Math.min(img.naturalHeight - cropH, cropY));
}

function getDispScale() {
  return { sx: displayImg.offsetWidth / img.naturalWidth,
           sy: displayImg.offsetHeight / img.naturalHeight };
}

/* ===== UI update ===== */
function updateUI() {
  if (!img) return;
  if (mode === 'crop') {
    clampCrop();
    const { sx, sy } = getDispScale();
    cropBox.style.left   = (cropX * sx) + 'px';
    cropBox.style.top    = (cropY * sy) + 'px';
    cropBox.style.width  = (cropW * sx) + 'px';
    cropBox.style.height = (cropH * sy) + 'px';
    outputSizeEl.textContent = cropW + ' × ' + cropH + ' px';
    drawCropPreview();
  } else {
    const { outW, outH } = lbDims();
    outputSizeEl.textContent = outW + ' × ' + outH + ' px';
    drawLBPreview();
  }
}

/* ===== Letterbox ===== */
function lbDims() {
  const rw = ratio.w, rh = ratio.h;
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const imgR = iw / ih, tgtR = rw / rh;
  let outW, outH, imgX, imgY;
  if (imgR >= tgtR) {
    outW = iw; outH = Math.round(iw / tgtR); imgX = 0; imgY = Math.round((outH - ih) / 2);
  } else {
    outH = ih; outW = Math.round(ih * tgtR); imgY = 0; imgX = Math.round((outW - iw) / 2);
  }
  return { outW, outH, imgX, imgY };
}

function drawLBToCanvas(canvas, scale) {
  const { outW, outH, imgX, imgY } = lbDims();
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const w = Math.round(outW * scale), h = Math.round(outH * scale);
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  if (bgType === 'transparent') {
    ctx.clearRect(0, 0, w, h);
  } else if (bgType === 'blur') {
    const s = Math.max(w / iw, h / ih) * 1.15;
    const bw = iw * s, bh = ih * s;
    ctx.filter = 'blur(28px) brightness(0.8)';
    ctx.drawImage(img, (w - bw) / 2, (h - bh) / 2, bw, bh);
    ctx.filter = 'none';
  } else {
    ctx.fillStyle = bgType === 'custom' ? customColor : (bgType === 'white' ? '#ffffff' : '#111111');
    ctx.fillRect(0, 0, w, h);
  }
  ctx.drawImage(img, imgX * scale, imgY * scale, iw * scale, ih * scale);
}

function drawLBPreview() {
  const { outW, outH } = lbDims();
  const MAX = 240;
  const scale = Math.min(MAX / outW, MAX / outH, 1);
  drawLBToCanvas(previewCanvas, scale);
}

/* ===== Crop preview ===== */
function drawCropPreview() {
  const MAX = 240;
  let pw = cropW, ph = cropH;
  if (pw > MAX || ph > MAX) {
    if (pw / MAX > ph / MAX) { ph = Math.round(ph * MAX / pw); pw = MAX; }
    else { pw = Math.round(pw * MAX / ph); ph = MAX; }
  }
  previewCanvas.width = pw; previewCanvas.height = ph;
  previewCanvas.getContext('2d').drawImage(img, cropX, cropY, cropW, cropH, 0, 0, pw, ph);
}

/* ===== Crop drag ===== */
let dragging = false, dx0, dy0, cx0, cy0;

cropBox.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  e.preventDefault(); dragging = true;
  dx0 = e.clientX; dy0 = e.clientY; cx0 = cropX; cy0 = cropY;
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const { sx, sy } = getDispScale();
  cropX = Math.round(cx0 + (e.clientX - dx0) / sx);
  cropY = Math.round(cy0 + (e.clientY - dy0) / sy);
  updateUI();
});
document.addEventListener('mouseup', () => { dragging = false; });

cropBox.addEventListener('touchstart', e => {
  e.preventDefault(); const t = e.touches[0];
  dragging = true; dx0 = t.clientX; dy0 = t.clientY; cx0 = cropX; cy0 = cropY;
}, { passive: false });
document.addEventListener('touchmove', e => {
  if (!dragging) return;
  const t = e.touches[0], { sx, sy } = getDispScale();
  cropX = Math.round(cx0 + (t.clientX - dx0) / sx);
  cropY = Math.round(cy0 + (t.clientY - dy0) / sy);
  updateUI();
}, { passive: false });
document.addEventListener('touchend', () => { dragging = false; });

window.addEventListener('resize', () => { if (img) updateUI(); });

/* ===== Download ===== */
let successTimer;
function download(fmt) {
  const canvas = document.createElement('canvas');
  if (mode === 'lb') {
    drawLBToCanvas(canvas, 1);
  } else {
    canvas.width = cropW; canvas.height = cropH;
    canvas.getContext('2d').drawImage(img, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
  }
  const mime = fmt === 'jpg' ? 'image/jpeg' : 'image/png';
  const a = document.createElement('a');
  a.href = canvas.toDataURL(mime, 0.92);
  a.download = (mode === 'lb' ? 'letterbox' : 'crop') + '_' + ratio.w + 'x' + ratio.h + (fmt === 'jpg' ? '.jpg' : '.png');
  a.click();
  clearTimeout(successTimer);
  successMsg.textContent = '✓ ダウンロードしました';
  successTimer = setTimeout(() => { successMsg.textContent = ''; }, 3000);
}

document.getElementById('dlPng').addEventListener('click', () => download('png'));
document.getElementById('dlJpg').addEventListener('click', () => download('jpg'));
</script>
</body>
</html>
