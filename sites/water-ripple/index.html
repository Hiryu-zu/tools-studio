<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水面リップル背景エフェクト</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="glCanvas"></canvas>

  <div id="fallback" class="fallback" hidden>
    <p>お使いの環境ではこのエフェクトを表示できません。最新のブラウザでお試しください。</p>
  </div>

  <div id="panel" class="panel">
    <button id="panelToggle" class="panel-toggle" type="button" aria-label="設定を開閉">⚙</button>
    <div class="panel-body">
      <h1>水面リップル背景エフェクト</h1>
      <p class="hint">マウス移動・クリックで波紋が広がります</p>

      <label class="field">
        <span>波の強さ</span>
        <input type="range" id="refraction" min="0" max="0.15" step="0.005" value="0.05">
      </label>

      <label class="field">
        <span>波紋の減衰</span>
        <input type="range" id="damping" min="0.95" max="0.999" step="0.001" value="0.985">
      </label>

      <label class="field">
        <span>自動の波</span>
        <input type="checkbox" id="autoRipple" checked>
      </label>

      <label class="field file-field">
        <span>背景画像を変更</span>
        <input type="file" id="bgInput" accept="image/*">
      </label>

      <button id="resetBtn" class="reset-btn" type="button">波紋をリセット</button>
    </div>
  </div>

  <script src="bg-data.js"></script>
  <script src="ripple.js"></script>
</body>
</html>
